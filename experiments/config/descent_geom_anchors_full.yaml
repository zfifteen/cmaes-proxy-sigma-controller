experiment_name: descent_geom_anchors_full

matrix:
  functions: [sphere, rosenbrock, rastrigin, ellipsoid_cond1e6]
  dimensions: [10, 20, 40]
  noise_sigmas: [0.0, 0.1, 0.2]

methods:
  - vanilla_cma
  - proxy_sigma_controller
reference_method: vanilla_cma

budget:
  evals_per_run: 1000

cma:
  initial_sigma: 2.0
  base_popsize: 10
  verbose: -9

proxy_defaults:
  ema_alpha: 0.2
  snr_up_threshold: 0.25
  snr_down_threshold: 0.08
  sigma_up_factor: 1.03
  sigma_down_factor: 0.90
  sigma_min_ratio: 0.10
  sigma_max_ratio: 10.0

variants:
  - variant_id: anchor_k086_r002
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.86
      sigma_min_ratio: 0.02
  - variant_id: anchor_k090_r005
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.90
      sigma_min_ratio: 0.05
  - variant_id: anchor_k093_r005
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.93
      sigma_min_ratio: 0.05
  - variant_id: anchor_k095_r005
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.95
      sigma_min_ratio: 0.05
  - variant_id: anchor_k097_r005
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.97
      sigma_min_ratio: 0.05
  - variant_id: anchor_k090_r010
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.90
      sigma_min_ratio: 0.10
  - variant_id: anchor_k095_r010
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.95
      sigma_min_ratio: 0.10
  - variant_id: anchor_k097_r010
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.97
      sigma_min_ratio: 0.10
  - variant_id: anchor_k093_r020
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.93
      sigma_min_ratio: 0.20
  - variant_id: anchor_k098_r025
    method: proxy_sigma_controller
    proxy_overrides:
      sigma_down_factor: 0.98
      sigma_min_ratio: 0.25

sweeps: []

telemetry:
  proxy_trace_mode: full

seeds:
  eval: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009,
         1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019]

runtime:
  parallel_workers: 1

analysis:
  default_pairwise:
    method_a: vanilla_cma
    method_b: proxy_sigma_controller:anchor_k090_r010

hypotheses:
  checks:
    - id: anchors_baseline_nonpositive_delta
      type: metric_threshold
      dataset: method_aggregate
      where:
        method_instance: proxy_sigma_controller:anchor_k090_r010
      metric: median_of_cell_median_delta
      aggregate: first
      op: "<="
      threshold: 0.0

    - id: anchors_winrate_delta_correlation
      type: correlation_threshold
      dataset: method_aggregate
      where:
        method: proxy_sigma_controller
      x_metric: mean_win_rate
      y_metric: median_of_cell_median_delta
      method: pearson
      op: "<="
      threshold: -0.20

    - id: anchors_baseline_behavior_rows
      type: comparative_threshold
      dataset: behavior_aggregate
      metric: n_behavior_rows
      aggregate: first
      lhs_where:
        method_instance: proxy_sigma_controller:anchor_k090_r010
      rhs_where:
        method_instance: vanilla_cma
      op: ">"
      threshold: 0.0

    - id: anchors_trace_coverage
      type: metric_threshold
      dataset: runs_long
      where:
        method: proxy_sigma_controller
        phase: eval
        status: ok
      metric: proxy_trace_written
      aggregate: mean
      op: ">="
      threshold: 0.999

