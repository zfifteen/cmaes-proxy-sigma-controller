sweeps: []

telemetry:
  proxy_trace_mode: hybrid

seeds:
  eval: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009,
         1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019,
         1020, 1021, 1022, 1023, 1024, 1025, 1026, 1027, 1028, 1029,
         1030, 1031, 1032, 1033, 1034, 1035, 1036, 1037, 1038, 1039,
         1040, 1041, 1042, 1043, 1044, 1045, 1046, 1047, 1048, 1049]

runtime:
  parallel_workers: 1

analysis:
  default_pairwise:
    method_a: vanilla_cma
    method_b: proxy_sigma_controller:int_k090_r010_t008_025

hypotheses:
  checks:
    - id: interaction_baseline_nonpositive_delta
      type: metric_threshold
      dataset: method_aggregate
      where:
        method_instance: proxy_sigma_controller:int_k090_r010_t008_025
      metric: median_of_cell_median_delta
      aggregate: first
      op: "<="
      threshold: 0.0

    - id: interaction_winrate_delta_correlation
      type: correlation_threshold
      dataset: method_aggregate
      where:
        method: proxy_sigma_controller
      x_metric: mean_win_rate
      y_metric: median_of_cell_median_delta
      method: pearson
      op: "<="
      threshold: -0.20

    - id: interaction_baseline_behavior_rows
      type: comparative_threshold
      dataset: behavior_aggregate
      metric: n_behavior_rows
      aggregate: first
      lhs_where:
        method_instance: proxy_sigma_controller:int_k090_r010_t008_025
      rhs_where:
        method_instance: vanilla_cma
      op: ">"
      threshold: 0.0
