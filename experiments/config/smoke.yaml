experiment_name: smoke_pipeline

matrix:
  functions: [sphere, rosenbrock, rastrigin, ellipsoid_cond1e6]
  dimensions: [10, 20, 40]
  noise_sigmas: [0.0, 0.1, 0.2]

methods:
  - vanilla_cma
  - proxy_sigma_controller
reference_method: vanilla_cma

budget:
  evals_per_run: 200

cma:
  initial_sigma: 2.0
  base_popsize: 10
  verbose: -9

proxy_defaults:
  ema_alpha: 0.2
  snr_up_threshold: 0.25
  snr_down_threshold: 0.08
  sigma_up_factor: 1.03
  sigma_down_factor: 0.90
  sigma_min_ratio: 0.10
  sigma_max_ratio: 10.0

variants: []
sweeps: []

telemetry:
  proxy_trace_mode: hybrid

seeds:
  eval: [100, 101, 102, 103, 104, 105, 106, 107, 108, 109]

runtime:
  parallel_workers: 1

analysis:
  default_pairwise:
    method_a: vanilla_cma
    method_b: proxy_sigma_controller

hypotheses:
  checks:
    - id: smoke_proxy_nonpositive_median_delta
      type: metric_threshold
      dataset: method_aggregate
      where:
        method_instance: proxy_sigma_controller
      metric: median_of_cell_median_delta
      aggregate: first
      op: "<="
      threshold: 0.0

    - id: smoke_proxy_behavior_rows
      type: comparative_threshold
      dataset: behavior_aggregate
      metric: n_behavior_rows
      aggregate: first
      lhs_where:
        method_instance: proxy_sigma_controller
      rhs_where:
        method_instance: vanilla_cma
      op: ">"
      threshold: 0.0
